name: Roll back deployment

on:
  workflow_dispatch:
    inputs:
      target:
        description: Environment to restore
        required: true
        type: choice
        options: [staging, production]
      ref:
        description: Known-good commit SHA or release tag
        required: true
        type: string
      confirmation:
        description: Type ROLLBACK to authorize
        required: true
        type: string

concurrency:
  group: firebase-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit confirmation
        if: inputs.confirmation != 'ROLLBACK'
        run: exit 1

  rollback:
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --global firebase-tools
      - run: npm install --no-audit --no-fund
        working-directory: functions
      - run: npm run build
        working-directory: functions
      - run: flutter pub get
      - run: flutter build web --release --no-pub --dart-define=APP_ENV=${{ inputs.target }} --dart-define=AI_API_URL=${{ vars.AI_API_URL }}
      - run: firebase deploy --project "${{ vars.FIREBASE_PROJECT_ID }}" --only firestore:rules,firestore:indexes,database,storage,remoteconfig,functions:operations,hosting --non-interactive
