name: Build tagged release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-pub
      - run: flutter test --no-pub --reporter compact
      - run: flutter build web --release --no-pub --dart-define=APP_ENV=production --dart-define=AI_API_URL=${{ vars.AI_API_URL }} --dart-define=APP_CHECK_WEB_KEY=${{ vars.APP_CHECK_WEB_KEY }}
      - run: flutter build appbundle --release --no-pub --dart-define=APP_ENV=production --dart-define=AI_API_URL=${{ vars.AI_API_URL }}
      - name: Generate changelog
        shell: bash
        run: |
          previous=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$previous" ]; then range="$previous..HEAD"; else range="HEAD"; fi
          git log "$range" --pretty='- %s (%h)' > RELEASE_NOTES.md
      - uses: actions/upload-artifact@v4
        with:
          name: production-release-${{ github.ref_name }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/web
            RELEASE_NOTES.md
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: build/app/outputs/bundle/release/app-release.aab

