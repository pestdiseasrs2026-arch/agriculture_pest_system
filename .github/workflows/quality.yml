name: Quality gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-pub
      - run: flutter test --no-pub --reporter compact
      - run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/critical_path_test.dart -d chrome --no-pub
      - run: flutter build web --release --no-pub --dart-define=APP_ENV=production

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug --no-pub --dart-define=APP_ENV=staging
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  firebase-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm install --no-audit --no-fund
        working-directory: firebase-tests
      - run: npm install --global firebase-tools
      - run: firebase emulators:exec --project agriculture-pest-system-96401 --only firestore,database,storage "npm test --prefix firebase-tests"

  functions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
        working-directory: functions
      - run: npm run lint
        working-directory: functions
